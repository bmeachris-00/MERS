<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NightDrive — Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080e;--surface:#0f1320;--surface2:#161c2e;--surface3:#1e2640;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.13);
  --text:#dde2f0;--muted:#505870;--muted2:#7d8eaa;
  --accent:#4ecdc4;--accent2:#5b9ef8;--red:#e05a6a;--amber:#f5a623;--purple:#a78bfa;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

#rain-canvas,#bokeh-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
#rain-canvas{opacity:.45}

.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:1fr 90px;height:100vh;max-height:100vh;position:relative;overflow:hidden}

/* sidebar */
.sidebar{grid-row:1/2;background:rgba(7,8,14,.94);border-right:.5px solid var(--border);display:flex;flex-direction:column;position:relative;z-index:10;backdrop-filter:blur(16px);min-height:0;overflow:hidden}
.logo{display:flex;align-items:center;gap:10px;padding:22px 20px 18px;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;border-bottom:.5px solid var(--border);flex-shrink:0}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px}
.nav{padding:14px 12px 0;flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:8px;font-size:13px;color:var(--muted2);cursor:pointer;transition:all .18s;margin-bottom:1px}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--text)}
.sidebar-sec{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:18px 20px 8px;font-weight:500;flex-shrink:0}
.album-list{overflow-y:auto;flex:1;padding:0 12px 12px}
.album-list::-webkit-scrollbar{width:3px}
.album-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
.al-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .18s}
.al-item:hover{background:var(--surface2)}
.al-item.active{background:var(--surface3)}
.al-thumb{width:36px;height:36px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.al-info{min-width:0}
.al-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al-artist{font-size:11px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-zone{margin:10px 12px 4px;border:1.5px dashed var(--border2);border-radius:10px;padding:14px 12px;text-align:center;cursor:pointer;transition:all .2s;color:var(--muted2);font-size:12px;line-height:1.6;flex-shrink:0}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(78,205,196,.05);color:var(--accent)}
.drop-zone-icon{font-size:20px;margin-bottom:4px}
#file-input{display:none}
.clear-btn{margin:0 12px 14px;padding:8px;border-radius:8px;font-size:11px;color:var(--muted);text-align:center;cursor:pointer;border:.5px solid var(--border);transition:all .2s;flex-shrink:0}
.clear-btn:hover{color:var(--red);border-color:var(--red)}

/* main */
.main{grid-column:2;grid-row:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:5;min-height:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:.5px solid var(--border);backdrop-filter:blur(8px);flex-shrink:0}
.topbar-nav{display:flex;gap:8px}
.nav-arrow{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:.5px solid var(--border);color:var(--muted2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .18s}
.nav-arrow:hover{color:var(--text);background:var(--surface3)}
.topbar-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface2);border:.5px solid var(--border2);border-radius:20px;padding:7px 14px}
.search-wrap svg{width:13px;height:13px;flex-shrink:0;color:var(--muted2)}
#search-input{background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);width:150px}
#search-input::placeholder{color:var(--muted)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#07080e}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px;position:relative;min-height:0}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* album hero */
.album-hero{display:flex;align-items:flex-end;gap:28px;margin-bottom:32px;padding-bottom:28px;border-bottom:.5px solid var(--border)}
.hero-art{width:160px;height:160px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.hero-art-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.06) 0%,rgba(0,0,0,.45) 100%)}
.hero-meta{flex:1}
.hero-type{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
.hero-title{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;line-height:1.05;margin-bottom:10px}
.hero-artist{font-size:14px;color:var(--muted2);margin-bottom:6px}
.hero-stats{font-size:12px;color:var(--muted);margin-bottom:20px}
.hero-actions{display:flex;align-items:center;gap:12px}
.btn-play-hero{display:flex;align-items:center;gap:8px;padding:11px 26px;border-radius:50px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:#07080e}
.btn-play-hero:hover{transform:scale(1.03);opacity:.88}
.btn-ghost{width:38px;height:38px;border-radius:50%;border:.5px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .18s}
.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-ghost.on{color:var(--red);border-color:var(--red)}

/* tracks */
.track-list-header{display:grid;grid-template-columns:40px 1fr 80px 36px;padding:6px 12px 10px;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);border-bottom:.5px solid var(--border);margin-bottom:4px}
.track-row{display:grid;grid-template-columns:40px 1fr 80px 36px;padding:8px 12px;border-radius:8px;cursor:pointer;align-items:center;transition:background .15s;gap:4px}
.track-row:hover{background:var(--surface2)}
.track-row:hover .tr-next{opacity:1}
.track-row.active{background:rgba(78,205,196,.07)}
.tr-num{font-size:13px;color:var(--muted);text-align:center;width:28px}
.track-row.active .tr-num{color:var(--accent)}
.eq-mini{display:flex;gap:2px;align-items:flex-end;height:14px;justify-content:center;width:28px}
.eq-mini span{width:3px;border-radius:1px;background:var(--accent);animation:eqb .5s infinite alternate}
.eq-mini span:nth-child(2){animation-delay:.15s}
.eq-mini span:nth-child(3){animation-delay:.3s}
@keyframes eqb{from{height:3px}to{height:11px}}
.tr-info{display:flex;align-items:center;gap:12px;min-width:0}
.tr-thumb{width:40px;height:40px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.tr-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-row.active .tr-name{color:var(--accent)}
.tr-artist{font-size:11px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-dur{font-size:12px;color:var(--muted);text-align:right}
.tr-next{
  width:28px;height:28px;border-radius:50%;border:.5px solid var(--border2);
  background:transparent;color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:10px;
  justify-self:center;transition:all .18s;flex-shrink:0
}
.tr-next:hover{background:var(--accent);color:#07080e;border-color:var(--accent);transform:scale(1.1)}
.track-row.active .tr-next{color:var(--accent);border-color:var(--accent)}

/* empty */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted2)}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}
.empty-sub{font-size:13px;line-height:1.6}

/* library */
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.lib-card{border-radius:12px;overflow:hidden;border:.5px solid var(--border);cursor:pointer;transition:transform .18s}
.lib-card:hover{transform:scale(1.03)}
.lib-art{height:130px;display:flex;align-items:center;justify-content:center;font-size:68px}
.lib-info{padding:10px 12px;background:var(--surface2)}
.lib-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-count{font-size:11px;color:var(--muted2);margin-top:2px}

/* player */
.player{grid-column:1/3;grid-row:2;background:rgba(7,8,14,.97);border-top:.5px solid var(--border);display:grid;grid-template-columns:280px 1fr 240px;align-items:center;padding:0 24px;gap:16px;position:relative;z-index:20;backdrop-filter:blur(20px)}
.np{display:flex;align-items:center;gap:14px}
.np-art{width:52px;height:52px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--surface2)}
.np-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.np-artist{font-size:11px;color:var(--muted2)}
.np-like{font-size:17px;color:var(--muted);cursor:pointer;margin-left:6px;transition:color .2s;flex-shrink:0}
.np-like:hover{color:var(--red)}
.np-like.on{color:var(--red)}
.center-ctrl{display:flex;flex-direction:column;align-items:center;gap:10px}
.ctrl-btns{display:flex;align-items:center;gap:18px}
.c-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .18s}
.c-btn:hover{color:var(--text)}
.c-btn.active-ctrl{color:var(--accent)}
.c-btn.pp{width:38px;height:38px;background:var(--text);color:var(--bg);font-size:15px;border-radius:50%}
.c-btn.pp:hover{opacity:.85;transform:scale(1.04)}
.prog-row{display:flex;align-items:center;gap:10px;width:100%}
.prog-time{font-size:10px;color:var(--muted);width:34px}
.prog-track{flex:1;height:3px;background:var(--surface3);border-radius:3px;cursor:pointer;transition:height .15s}
.prog-track:hover{height:5px}
.prog-fill{height:100%;border-radius:3px;width:0%;transition:width .25s linear}
.right-ctrl{display:flex;align-items:center;justify-content:flex-end;gap:12px}
.vol-icon{font-size:16px;color:var(--muted)}
.vol-slider{-webkit-appearance:none;width:90px;height:3px;background:var(--surface3);border-radius:3px;outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--text);cursor:pointer}

/* back to top */
#back-top{position:fixed;bottom:108px;right:24px;width:38px;height:38px;border-radius:50%;background:var(--surface3);border:.5px solid var(--border2);color:var(--muted2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;z-index:50;opacity:0;pointer-events:none;transition:all .3s;transform:translateY(8px)}
#back-top.show{opacity:1;pointer-events:auto;transform:translateY(0)}
#back-top:hover{background:var(--surface2);color:var(--text)}

/* toast */
.toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface3);border:.5px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--text);z-index:100;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<canvas id="bokeh-canvas"></canvas>
<canvas id="rain-canvas"></canvas>

<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-icon">🌷</div>NightDrive
    </div>
    <div class="nav">
      <div class="nav-item active" id="nav-home" onclick="setView('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
      </div>
      <div class="nav-item" id="nav-search" onclick="setView('search')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search
      </div>
      <div class="nav-item" id="nav-library" onclick="setView('library')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>Library
      </div>
    </div>
    <div class="sidebar-sec">Your Albums</div>
    <div class="album-list" id="album-list"></div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-zone-icon">🎵</div>
      <div><strong>Drop MP3 files here</strong><br/>or click to browse</div>
    </div>
    <input type="file" id="file-input" multiple accept="audio/*"/>
    <div class="clear-btn" onclick="clearLibrary()">🗑 Clear saved library</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-nav">
        <div class="nav-arrow" onclick="historyBack()">‹</div>
        <div class="nav-arrow" onclick="historyFwd()">›</div>
      </div>
      <div class="topbar-title" id="topbar-title">NightDrive</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search-input" type="text" placeholder="Search tracks…" oninput="onSearch(this.value)"/>
        </div>
        <div class="user-avatar">ND</div>
      </div>
    </div>
    <div class="content" id="content" onscroll="onContentScroll()"></div>
  </div>

  <div class="player">
    <div class="np">
      <div class="np-art" id="np-art">🎵</div>
      <div style="min-width:0">
        <div class="np-title" id="np-title">No track playing</div>
        <div class="np-artist" id="np-artist">—</div>
      </div>
      <div class="np-like" id="np-like" onclick="toggleLike()">♡</div>
    </div>
    <div class="center-ctrl">
      <div class="ctrl-btns">
        <button class="c-btn" id="btn-shuffle" title="Shuffle" onclick="toggleShuffle()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
        <button class="c-btn" onclick="prevTrack()" title="Previous">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="c-btn pp" id="btn-pp" onclick="togglePlay()">▶</button>
        <button class="c-btn" onclick="nextTrack()" title="Next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="c-btn" id="btn-repeat" title="Repeat" onclick="toggleRepeat()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        </button>
      </div>
      <div class="prog-row">
        <span class="prog-time" id="cur-t">0:00</span>
        <div class="prog-track" id="prog-track" onclick="seekClick(event)"><div class="prog-fill" id="prog-fill"></div></div>
        <span class="prog-time" style="text-align:right" id="tot-t">0:00</span>
      </div>
    </div>
    <div class="right-ctrl">
      <span class="vol-icon">🔊</span>
      <input class="vol-slider" type="range" min="0" max="1" step="0.01" value="0.8" id="vol-slider" oninput="setVolume(this.value)"/>
    </div>
  </div>
</div>

<div id="back-top" onclick="scrollToTop()" title="Back to top">↑</div>
<div class="toast" id="toast"></div>
<audio id="audio-player"></audio>

<script>
// ══════════════════════════════════════════
// BOKEH CANVAS — blinks when music plays
// ══════════════════════════════════════════
const FX = (function(){
  const cv=document.getElementById('bokeh-canvas'), ctx=cv.getContext('2d');

  const COLS=[
    [120,180,255],[255,100,130],[80,230,210],[255,190,50],
    [190,150,255],[255,255,150],[150,230,255],[255,140,80],
    [120,255,180],[255,100,200]
  ];

  let orbs=[];
  let musicPlaying=false, blinkPhase=0;

  function R(a,b){return a+Math.random()*(b-a);}
  function rndCol(){return COLS[Math.floor(R(0,COLS.length))];}

  function resize(){cv.width=innerWidth;cv.height=innerHeight;buildOrbs();}

  function buildOrbs(){
    orbs=[];
    const W=cv.width,H=cv.height;
    // Large soft background blobs
    for(let i=0;i<8;i++){
      const c=COLS[i%COLS.length];
      orbs.push({x:R(0,W),y:R(0,H),r:R(150,320),c,baseA:R(.18,.38),bl:R(60,100),vx:R(-.12,.12),vy:R(-.08,.08),ph:R(0,Math.PI*2),phs:R(.002,.004),blinkOff:R(0,Math.PI*2),k:'blob'});
    }
    // Medium bokeh discs (streetlights)
    for(let i=0;i<32;i++){
      const c=rndCol(),r=R(18,60);
      orbs.push({x:R(0,W),y:R(0,H),r,c,baseA:R(.35,.75),bl:r*.5,vx:R(-.25,.25),vy:R(-.15,.15),ph:R(0,Math.PI*2),phs:R(.005,.01),blinkOff:R(0,Math.PI*2),k:'bok',ring:Math.random()>.4});
    }
    // Sparkle dots
    for(let i=0;i<50;i++){
      const c=rndCol();
      orbs.push({x:R(0,W),y:R(0,H),r:R(1.5,4),c,baseA:R(.5,.95),bl:1.5,vx:R(-.3,.3),vy:R(-.2,.2),ph:R(0,Math.PI*2),phs:R(.01,.02),blinkOff:R(0,Math.PI*2),k:'spark'});
    }
    // Road reflections
    for(let i=0;i<18;i++){
      const c=rndCol();
      orbs.push({x:R(0,W),y:H*.7+R(0,H*.3),r:R(5,16),c,baseA:R(.2,.45),bl:R(8,20),vx:R(-.1,.1),vy:0,ph:R(0,Math.PI*2),phs:R(.007,.012),blinkOff:R(0,Math.PI*2),k:'ref',sy:R(3,6)});
    }
  }

  resize();window.addEventListener('resize',resize);

  function onMusicStart(){ musicPlaying=true; }
  function onMusicStop(){ musicPlaying=false; }

  let t=0;
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    const W=cv.width,H=cv.height;

    // blinkPhase drives the blink — fast when playing, idle when not
    if(musicPlaying) blinkPhase+=.07;
    else             blinkPhase+=.012;

    orbs.forEach(o=>{
      // base slow drift pulse (always on)
      const driftPulse = .85 + .15*Math.sin(o.ph + t*o.phs);

      // blink: each orb has its own offset so they don't all blink in sync
      // when playing: strong fast blink between dim and bright
      // when idle: very gentle slow breathe
      let blink;
      if(musicPlaying){
        // fast blink — each orb blinks at slightly different rate
        blink = .5 + .5*Math.abs(Math.sin(blinkPhase*2 + o.blinkOff));
      } else {
        // slow idle breathe
        blink = .75 + .25*Math.sin(blinkPhase + o.blinkOff);
      }

      const a = Math.min(.99, o.baseA * driftPulse * blink);
      const r = o.r * (1 + (musicPlaying ? .08 : .03)*Math.sin(o.ph + t*o.phs));
      const [cr,cg,cb]=o.c;

      ctx.save();
      if(o.k==='ref'){
        ctx.scale(1,o.sy); ctx.filter=`blur(${o.bl}px)`;
        const g=ctx.createRadialGradient(o.x,o.y/o.sy,0,o.x,o.y/o.sy,r);
        g.addColorStop(0,`rgba(${cr},${cg},${cb},${a})`);
        g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
        ctx.beginPath();ctx.arc(o.x,o.y/o.sy,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      } else if(o.k==='bok'){
        ctx.filter=`blur(${o.bl}px)`;
        const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,r);
        g.addColorStop(0,`rgba(${cr},${cg},${cb},${a*.35})`);
        g.addColorStop(.5,`rgba(${cr},${cg},${cb},${a})`);
        g.addColorStop(.82,`rgba(${cr},${cg},${cb},${a*.6})`);
        g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
        ctx.beginPath();ctx.arc(o.x,o.y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
        if(o.ring){
          ctx.filter=`blur(${o.bl*.2}px)`;
          ctx.beginPath();ctx.arc(o.x,o.y,r*.88,0,Math.PI*2);
          ctx.strokeStyle=`rgba(${cr},${cg},${cb},${Math.min(.99,a*.7)})`;
          ctx.lineWidth=1.8;ctx.stroke();
        }
      } else if(o.k==='spark'){
        ctx.filter=`blur(${o.bl}px)`;
        ctx.beginPath();ctx.arc(o.x,o.y,r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${cr},${cg},${cb},${a})`;ctx.fill();
        ctx.filter='none';
        ctx.strokeStyle=`rgba(${cr},${cg},${cb},${a*.5})`;ctx.lineWidth=.6;
        const sl=r*4;
        ctx.beginPath();ctx.moveTo(o.x-sl,o.y);ctx.lineTo(o.x+sl,o.y);ctx.stroke();
        ctx.beginPath();ctx.moveTo(o.x,o.y-sl);ctx.lineTo(o.x,o.y+sl);ctx.stroke();
      } else {
        ctx.filter=`blur(${o.bl}px)`;
        const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,r);
        g.addColorStop(0,`rgba(${cr},${cg},${cb},${a})`);
        g.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
        ctx.beginPath();ctx.arc(o.x,o.y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      }
      ctx.restore();

      o.x+=o.vx; o.y+=o.vy;
      if(o.x<-o.r*2)o.x=W+o.r; if(o.x>W+o.r*2)o.x=-o.r;
      if(o.y<-o.r*2)o.y=H+o.r; if(o.y>H+o.r*2)o.y=-o.r;
    });

    t++;requestAnimationFrame(draw);
  }
  draw();

  return {onMusicStart, onMusicStop};
})();

// RAIN CANVAS
// ══════════════════════════════════════════
(function(){
  const cv=document.getElementById('rain-canvas'),ctx=cv.getContext('2d');
  let drops=[];
  function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<160;i++) drops.push({
    x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    len:8+Math.random()*20, spd:2.5+Math.random()*4,
    op:.15+Math.random()*.55, w:.4+Math.random()*.8
  });
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    drops.forEach(d=>{
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-1,d.y+d.len);
      ctx.strokeStyle=`rgba(160,210,255,${d.op})`;ctx.lineWidth=d.w;ctx.stroke();
      d.y+=d.spd;
      if(d.y>cv.height){d.y=-d.len;d.x=Math.random()*cv.width;}
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ══════════════════════════════════════════
// INDEXEDDB
// ══════════════════════════════════════════
const DB_NAME='NightDriveDB3',DB_VER=1,STORE='tracks';
let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE)){const s=d.createObjectStore(STORE,{keyPath:'id',autoIncrement:true});s.createIndex('artist','artist',{unique:false});}};r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=e=>rej(e.target.error);});}
function dbSave(rec){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const r=tx.objectStore(STORE).add(rec);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error);});}
function dbAll(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error);});}
function dbClear(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const r=tx.objectStore(STORE).clear();r.onsuccess=()=>res();r.onerror=e=>rej(e.target.error);});}
function dbPut(rec){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');const r=tx.objectStore(STORE).put(rec);r.onsuccess=()=>res();r.onerror=e=>rej(e.target.error);});}

async function loadFromDB(){
  const recs=await dbAll();
  if(!recs.length)return;
  recs.forEach(r=>{
    const blob=new Blob([r.blob],{type:r.type});
    addTrackMem({title:r.title,artist:r.artist,url:URL.createObjectURL(blob),dur:r.dur||0,dbId:r.id});
  });
  if(albums.length&&currentAlbumIdx<0)currentAlbumIdx=0;
  renderSidebar();renderContent();
  toast(`Loaded ${recs.length} track${recs.length>1?'s':''} 💾`);
}

function fmt(s){if(!s||isNaN(s))return'—';const m=Math.floor(s/60),sc=Math.floor(s%60);return`${m}:${sc.toString().padStart(2,'0')}`;}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);}
function accent(){return currentAlbumIdx>=0?albums[currentAlbumIdx].theme.accent:'#4ecdc4';}

// ══════════════════════════════════════════
// VIEW + NAVIGATION
// ══════════════════════════════════════════
function setView(v,push=true){
  if(push){navHistory=navHistory.slice(0,navPos+1);navHistory.push(v);navPos=navHistory.length-1;}
  currentView=v;
  ['home','search','library'].forEach(id=>{const el=document.getElementById('nav-'+id);if(el)el.classList.toggle('active',id===v);});
  if(v==='search')setTimeout(()=>document.getElementById('search-input').focus(),50);
  renderContent();
}
function historyBack(){if(navPos>0){navPos--;setView(navHistory[navPos],false);}}
function historyFwd(){if(navPos<navHistory.length-1){navPos++;setView(navHistory[navPos],false);}}
function onSearch(q){searchQuery=q.trim().toLowerCase();if(currentView!=='search')setView('search');else renderContent();}
function onContentScroll(){const el=document.getElementById('content'),btn=document.getElementById('back-top');btn.classList.toggle('show',el.scrollTop>200);}
function scrollToTop(){document.getElementById('content').scrollTo({top:0,behavior:'smooth'});}

// RENDER
// ══════════════════════════════════════════
function renderSidebar(){
  const list=document.getElementById('album-list');
  if(!albums.length){list.innerHTML=`<div style="padding:10px;font-size:12px;color:var(--muted);text-align:center">No albums yet</div>`;return;}
  list.innerHTML=albums.map((a,i)=>`
    <div class="al-item ${i===currentAlbumIdx?'active':''}" onclick="selectAlbum(${i})">
      <div class="al-thumb" style="background:${a.theme.bg}">${a.theme.icon}</div>
      <div class="al-info"><div class="al-title">${a.title}</div><div class="al-artist">${a.artist}</div></div>
    </div>`).join('');
}

function renderContent(){
  const c=document.getElementById('content');
  if(currentView==='search'){renderSearch(c);document.getElementById('topbar-title').textContent='Search';return;}
  if(currentView==='library'){renderLibrary(c);document.getElementById('topbar-title').textContent='Your Library';return;}
  if(!albums.length){
    document.getElementById('topbar-title').textContent='NightDrive';
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">🌧</div><div class="empty-title">Your night is empty</div><div class="empty-sub">Drop some MP3 files into the sidebar<br>to start your night drive.</div></div>`;
    return;
  }
  if(currentAlbumIdx<0){c.innerHTML='';return;}
  renderAlbum(c);
}

function renderAlbum(c){
  const a=albums[currentAlbumIdx],th=a.theme;
  document.getElementById('topbar-title').textContent=a.title;
  const rows=a.tracks.map((t,i)=>{
    const act=currentTrackIdx===i;
    return`<div class="track-row ${act?'active':''}" onclick="selectTrack(${i})">
      <div class="tr-num">${act&&isPlaying?'<div class="eq-mini"><span></span><span></span><span></span></div>':i+1}</div>
      <div class="tr-info">
        <div class="tr-thumb" style="background:${th.bg}">${th.icon}</div>
        <div style="min-width:0"><div class="tr-name">${t.title}</div><div class="tr-artist">${t.artist}</div></div>
      </div>
      <div class="tr-dur">${fmt(t.dur)}</div>
      <button class="tr-next" onclick="event.stopPropagation();queueNext(${i})" title="Queue as next">▶▶</button>
    </div>`;
  }).join('');
  c.innerHTML=`
    <div class="album-hero">
      <div class="hero-art" style="background:${th.bg}"><span>${th.icon}</span><div class="hero-art-overlay"></div></div>
      <div class="hero-meta">
        <div class="hero-type">Album</div>
        <div class="hero-title">${a.title}</div>
        <div class="hero-artist">${a.artist}</div>
        <div class="hero-stats">${a.tracks.length} song${a.tracks.length!==1?'s':''}</div>
        <div class="hero-actions">
          <button class="btn-play-hero" style="background:${th.accent}" onclick="playAlbum()">▶ &nbsp;Play</button>
          <button class="btn-ghost ${isShuffle?'on':''}" onclick="toggleShuffle()" title="Shuffle">⇄</button>
          <button class="btn-ghost" id="album-like-btn" onclick="toggleAlbumLike()">♡</button>
        </div>
      </div>
    </div>
    <div class="track-list-header"><span>#</span><span>Title</span><span style="text-align:right">Duration</span><span style="text-align:center;font-size:9px">Next</span></div>
    ${rows}`;
}

function renderSearch(c){
  if(!searchQuery){c.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Find your tracks</div><div class="empty-sub">Type in the search bar to find songs or albums.</div></div>`;return;}
  const res=[];
  albums.forEach((a,ai)=>a.tracks.forEach((t,ti)=>{if(t.title.toLowerCase().includes(searchQuery)||t.artist.toLowerCase().includes(searchQuery)||a.title.toLowerCase().includes(searchQuery))res.push({a,ai,t,ti});}));
  if(!res.length){c.innerHTML=`<div class="empty-state"><div class="empty-icon">🌧</div><div class="empty-title">No results</div><div class="empty-sub">Nothing matched "${searchQuery}".</div></div>`;return;}
  c.innerHTML=`
    <div style="font-size:12px;color:var(--muted2);margin-bottom:16px">${res.length} result${res.length!==1?'s':''} for "<strong style="color:var(--text)">${searchQuery}</strong>"</div>
    <div class="track-list-header"><span>#</span><span>Title</span><span style="text-align:right">Album</span><span style="text-align:center;font-size:9px">Play</span></div>
    ${res.map(({a,ai,t,ti},idx)=>`
      <div class="track-row ${currentAlbumIdx===ai&&currentTrackIdx===ti?'active':''}" onclick="jumpToTrack(${ai},${ti})">
        <div class="tr-num">${idx+1}</div>
        <div class="tr-info">
          <div class="tr-thumb" style="background:${a.theme.bg}">${a.theme.icon}</div>
          <div style="min-width:0"><div class="tr-name">${t.title}</div><div class="tr-artist">${t.artist}</div></div>
        </div>
        <div class="tr-dur" style="font-size:11px;color:var(--muted2)">${a.title}</div>
        <button class="tr-next" onclick="event.stopPropagation();jumpToTrack(${ai},${ti})" title="Play">▶</button>
      </div>`).join('')}`;
}

function renderLibrary(c){
  if(!albums.length){c.innerHTML=`<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-title">No albums yet</div><div class="empty-sub">Drop MP3s to build your library.</div></div>`;return;}
  c.innerHTML=`
    <div style="font-size:12px;color:var(--muted2);margin-bottom:20px">${albums.length} album${albums.length!==1?'s':''}</div>

      ${albums.map((a,i)=>`
        <div class="lib-card" onclick="selectAlbum(${i})">
          <div class="lib-art" style="background:${a.theme.bg}">${a.theme.icon}</div>
          <div class="lib-info"><div class="lib-name">${a.title}</div><div class="lib-count">${a.tracks.length} track${a.tracks.length!==1?'s':''}</div></div>

}

// ══════════════════════════════════════════
// FILE DROP & INDEXEDDB SAVE
// ══════════════════════════════════════════
const dz=document.getElementById('drop-zone'),fi=document.getElementById('file-input');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');handleFiles(Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('audio/')));});
fi.addEventListener('change',()=>{handleFiles(Array.from(fi.files).filter(f=>f.type.startsWith('audio/')));fi.value='';});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();const fs=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('audio/'));if(fs.length)handleFiles(fs);});

function addTrackMem({title,artist,url,dur,dbId}){
  let alb=albums.find(a=>a.artist===artist&&a.tracks.length<5);
  if(!alb){
    const idx=albums.length%THEMES.length;
    alb={title:artist!=='Unknown Artist'?`${artist} — Vol. ${albums.filter(a=>a.artist===artist).length+1}`:`Album ${albums.length+1}`,artist,theme:THEMES[idx],tracks:[]};
    albums.push(alb);
  }
  alb.tracks.push({title,artist,url,dur,dbId});
}

async function handleFiles(files){
  if(!files.length)return;
  let saved=0;
  for(const f of files){
    const raw=f.name.replace(/\.[^.]+$/,'');
    let title=raw,artist='Unknown Artist';
    const s=raw.indexOf(' - ');
    if(s>-1){artist=raw.slice(0,s).trim();title=raw.slice(s+3).trim();}
    const buf=await f.arrayBuffer();
    let dbId=null;
    try{dbId=await dbSave({title,artist,blob:buf,type:f.type,dur:0});}catch(e){console.warn(e);}
    const url=URL.createObjectURL(new Blob([buf],{type:f.type}));
    const tmp=new Audio(url);
    tmp.addEventListener('loadedmetadata',async()=>{
      const dur=tmp.duration;
      if(db&&dbId){try{const tx=db.transaction(STORE,'readwrite');const st=tx.objectStore(STORE);const rq=st.get(dbId);rq.onsuccess=()=>{const r=rq.result;if(r){r.dur=dur;st.put(r);}};}catch(e){}}
      for(const a of albums){const t=a.tracks.find(t=>t.dbId===dbId);if(t){t.dur=dur;if(currentView==='home')renderContent();break;}}
    });
    addTrackMem({title,artist,url,dur:0,dbId});
    saved++;
  }
  if(currentAlbumIdx<0&&albums.length)currentAlbumIdx=0;
  setView('home');renderSidebar();renderContent();
  toast(`Saved ${saved} track${saved>1?'s':''} 💾`);
}

async function clearLibrary(){
  if(!confirm('Remove all saved tracks from the library?'))return;
  await dbClear();
  albums=[];currentAlbumIdx=-1;currentTrackIdx=-1;isPlaying=false;pendingNext=null;
  audio.pause();audio.src='';
  renderSidebar();renderContent();
  document.getElementById('np-title').textContent='No track playing';
  document.getElementById('np-artist').textContent='—';
  document.getElementById('np-art').textContent='🎵';
  document.getElementById('btn-pp').textContent='▶';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('cur-t').textContent='0:00';
  document.getElementById('tot-t').textContent='0:00';
  toast('Library cleared');
}

// ══════════════════════════════════════════
// PLAYBACK
// ══════════════════════════════════════════
function selectAlbum(i){currentAlbumIdx=i;currentTrackIdx=-1;setView('home');renderSidebar();}
function jumpToTrack(ai,ti){currentAlbumIdx=ai;setView('home');renderSidebar();selectTrack(ti);}

function queueNext(ti){
  // If nothing playing, just play it
  if(!isPlaying||currentTrackIdx<0){selectTrack(ti);return;}
  pendingNext=ti;
  toast(`"${albums[currentAlbumIdx].tracks[ti].title}" queued as next ▶▶`);
}

function playAlbum(){
  if(!albums.length||currentAlbumIdx<0)return;
  const first=albums[currentAlbumIdx].tracks.findIndex(t=>t.url);
  if(first<0){toast('No audio loaded — drop MP3s first');return;}
  selectTrack(first);
}

function selectTrack(i){
  if(currentAlbumIdx<0)return;
  const a=albums[currentAlbumIdx];
  if(!a||!a.tracks[i])return;
  const t=a.tracks[i];
  if(!t.url){toast('No audio file for this track');return;}
  currentTrackIdx=i;pendingNext=null;
  audio.src=t.url;
  audio.volume=parseFloat(document.getElementById('vol-slider').value);
  audio.play();
  isPlaying=true;
  FX.onMusicStart();
  updatePlayerUI();renderContent();renderSidebar();
  document.getElementById('prog-fill').style.background=accent();
}

function togglePlay(){
  if(!audio.src)return;
  if(isPlaying){audio.pause();isPlaying=false;FX.onMusicStop();}
  else{audio.play();isPlaying=true;FX.onMusicStart();}
  document.getElementById('btn-pp').textContent=isPlaying?'⏸':'▶';
}

function prevTrack(){
  if(currentAlbumIdx<0)return;
  if(audio.currentTime>3){audio.currentTime=0;return;}
  const a=albums[currentAlbumIdx];
  for(let i=currentTrackIdx-1;i>=0;i--){if(a.tracks[i].url){selectTrack(i);return;}}
}

function nextTrack(){
  if(currentAlbumIdx<0)return;
  if(pendingNext!=null){const n=pendingNext;pendingNext=null;selectTrack(n);return;}
  const a=albums[currentAlbumIdx];
  if(isShuffle){
    const pl=a.tracks.map((t,i)=>t.url?i:-1).filter(i=>i>=0);
    if(pl.length)selectTrack(pl[Math.floor(Math.random()*pl.length)]);
  } else {
    for(let i=currentTrackIdx+1;i<a.tracks.length;i++){if(a.tracks[i].url){selectTrack(i);return;}}
    if(isRepeat){const f=a.tracks.findIndex(t=>t.url);if(f>=0)selectTrack(f);}
  }
}

function toggleShuffle(){isShuffle=!isShuffle;document.getElementById('btn-shuffle').classList.toggle('active-ctrl',isShuffle);toast(isShuffle?'Shuffle on':'Shuffle off');renderContent();}
function toggleRepeat(){isRepeat=!isRepeat;document.getElementById('btn-repeat').classList.toggle('active-ctrl',isRepeat);toast(isRepeat?'Repeat on':'Repeat off');}
function toggleLike(){
  if(currentTrackIdx<0)return;
  const k=`${currentAlbumIdx}-${currentTrackIdx}`,el=document.getElementById('np-like');
  if(likedTracks.has(k)){likedTracks.delete(k);el.classList.remove('on');el.textContent='♡';}
  else{likedTracks.add(k);el.classList.add('on');el.textContent='♥';}
}
function toggleAlbumLike(){const el=document.getElementById('album-like-btn');if(!el)return;const on=el.classList.toggle('on');el.textContent=on?'♥':'♡';toast(on?'Album liked ♥':'Album unliked');}
function setVolume(v){audio.volume=parseFloat(v);}
function seekClick(e){if(!audio.duration)return;const b=document.getElementById('prog-track');audio.currentTime=(e.offsetX/b.clientWidth)*audio.duration;}

function updatePlayerUI(){
  if(currentAlbumIdx<0||currentTrackIdx<0)return;
  const a=albums[currentAlbumIdx],t=a.tracks[currentTrackIdx];
  document.getElementById('np-art').style.background=a.theme.bg;
  document.getElementById('np-art').textContent=a.theme.icon;
  document.getElementById('np-title').textContent=t.title;
  document.getElementById('np-artist').textContent=t.artist;
  document.getElementById('btn-pp').textContent=isPlaying?'⏸':'▶';
  document.getElementById('prog-fill').style.background=a.theme.accent;
  const k=`${currentAlbumIdx}-${currentTrackIdx}`,el=document.getElementById('np-like');
  el.classList.toggle('on',likedTracks.has(k));el.textContent=likedTracks.has(k)?'♥':'♡';
}

// audio events
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  document.getElementById('prog-fill').style.width=((audio.currentTime/audio.duration)*100)+'%';
  document.getElementById('cur-t').textContent=fmt(audio.currentTime);
  document.getElementById('tot-t').textContent=fmt(audio.duration);
});
audio.addEventListener('ended',()=>{isPlaying=false;nextTrack();});
